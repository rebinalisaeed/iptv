<!DOCTYPE html>
<html lang="ckb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXINFLIX - فیلم و زنجیرەکان</title>
  <style>
    @font-face {
      font-family: 'Exinflix Bold';
      src: url('fonts/Exinflix-Bd.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }
    @font-face {
      font-family: 'Exinflix Regular';
      src: url('fonts/Exinflix-Reg.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Exinflix Regular', sans-serif;
      background: #0B0B12;
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      transition: all 0.3s;
    }
    .glass-card:hover {
      border-color: #FF006E;
      transform: translateY(-5px);
    }
  </style>
</head>
<body>
  <div class="max-w-6xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-8">
      <img src="assets/logo/logo.png" alt="EXINFLIX" class="h-12 w-auto">
      <a href="index.html" class="glass-card px-5 py-2 rounded-full text-white text-sm hover:text-pink-400">← گەڕانەوە</a>
    </div>
    <h1 class="text-3xl font-bold text-white mb-6" style="font-family: 'Exinflix Bold', sans-serif;">فیلم و زنجیرەکان</h1>
    <div class="grid md:grid-cols-4 gap-5">
      <div class="glass-card rounded-xl overflow-hidden cursor-pointer"><img src="https://placehold.co/400x500/FF006E/white?text=FILM" class="w-full h-48 object-cover"><div class="p-3"><h3 class="font-bold text-white">ئاگر لە دڵدا</h3><p class="text-gray-400 text-sm">ئەکشن</p></div></div>
      <div class="glass-card rounded-xl overflow-hidden cursor-pointer"><img src="https://placehold.co/400x500/FF7A00/white?text=SERIES" class="w-full h-48 object-cover"><div class="p-3"><h3 class="font-bold text-white">زنجیرەی تاوان</h3><p class="text-gray-400 text-sm">دراما</p></div></div>
      <div class="glass-card rounded-xl overflow-hidden cursor-pointer"><img src="https://placehold.co/400x500/7B2CFF/white?text=MOVIE" class="w-full h-48 object-cover"><div class="p-3"><h3 class="font-bold text-white">ڕێگای مانگ</h3><p class="text-gray-400 text-sm">فانتازی</p></div></div>
    </div>
  </div>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</body>
</html>
