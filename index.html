<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPTV Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- لای چەپ: لیستی کەناڵەکان -->
        <div class="channels-sidebar">
            <div class="sidebar-header">
                <h2>📡 پلەیەر</h2>
                <div class="search-wrapper">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="گەڕان بە کەناڵ...">
                </div>
            </div>
            <div class="channels-list" id="channelsList">
                <!-- کەناڵەکان لێرە دەردەکەون -->
            </div>
            <button class="add-channel-btn" id="addChannelBtn">+ کەناڵی نوێ</button>
        </div>

        <!-- لای ڕاست: ڤیدیۆ و EPG -->
        <div class="video-area">
            <div class="video-wrapper">
                <video id="videoPlayer" controls autoplay playsinline></video>
            </div>
            <div class="epg-section">
                <h4>📺 ڕێنمایی کەناڵ (EPG)</h4>
                <div id="epgContent" class="epg-list"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
