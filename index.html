<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPTV - درێژی بە زۆر (بەبێ ئاگاداری)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* زۆرکردنی درێژی بە زۆر لەسەر هەموو شتێک */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            background: #000;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* کانتێنەری سەرەکی - هەمیشە بە شێوەی ڕیز (ئاسۆیی) */
        .iptv-app {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1c;
            display: flex;
            flex-direction: row; /* landscape force */
            overflow: hidden;
        }

        /* لای چەپ - لیستی کەناڵەکان */
        .channels-panel {
            width: 32%;
            background: rgba(6, 10, 20, 0.96);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 1rem;
            background: #03060c;
        }

        .panel-header h2 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, #fff, #5db0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-box {
            background: #1e2a3a;
            border-radius: 2rem;
            padding: 0.4rem 1rem;
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.6rem;
        }

        .channel-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #111a2a;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 1.2rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.1s;
        }

        .channel-card.active {
            background: #1f3a60;
            border-left-color: #3b82f6;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ff9f8f;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* بەشی ڕاست */
        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #010101;
        }

        .player-container {
            background: #000;
            flex: 2;
            min-height: 55%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .epg-container {
            background: #0a0e16e6;
            padding: 0.8rem;
            flex: 1;
            overflow-y: auto;
        }

        .epg-item {
            background: #111b26;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 14px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            background: #2d4a7c;
            border: none;
            padding: 8px 0;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .channels-panel { width: 38%; }
            .channel-card { padding: 6px 10px; }
            .panel-header h2 { font-size: 1rem; }
        }

        /* هیچ orientation-warning یەک نییە - بە زۆر درێژی */
    </style>
</head>
<body>

<div class="iptv-app">
    <!-- لای چەپ -->
    <div class="channels-panel">
        <div class="panel-header">
            <h2>📡 IPTV پلەیەر (درێژی)</h2>
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="گەڕان بە کەناڵ...">
            </div>
        </div>
        <div class="channels-list" id="channelsList"></div>
        <div style="padding: 10px;">
            <button id="addChannelBtn">+ کەناڵی نوێ</button>
        </div>
    </div>

    <!-- لای ڕاست -->
    <div class="video-area">
        <div class="player-container">
            <video id="videoPlayer" controls autoplay playsinline></video>
        </div>
        <div class="epg-container">
            <div id="epgInfo">📺 کەناڵێک هەڵبژێرە</div>
        </div>
    </div>
</div>

<script>
    // داتای بنەڕەتی
    let channels = [
        { id: 1, name: "AL JAZEERA", logo: "🌍", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", epg: ["06:00 - هەواڵی بەیانی", "12:00 - کۆڕبەندی سیاسی", "18:00 - پەخشی ڕاستەوخۆ"] },
        { id: 2, name: "BBC WORLD", logo: "📺", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8", epg: ["07:00 - Global News", "14:00 - Tech Life", "20:00 - Documentary"] },
        { id: 3, name: "SPORT 24", logo: "⚽", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", epg: ["09:00 - پوختەی یارییەکان", "16:00 - یاری راستەوخۆ", "22:00 - گفتوگۆ"] }
    ];
    let activeId = 1;

    // LocalStorage
    function saveToLocal() {
        localStorage.setItem("iptv_forced_channels", JSON.stringify(channels));
    }

    function loadFromLocal() {
        const stored = localStorage.getItem("iptv_forced_channels");
        if(stored) {
            channels = JSON.parse(stored);
        }
        if(!channels.length) channels = [...channels];
        activeId = channels[0].id;
    }

    // نمایش کەناڵەکان
    function renderChannels() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const filtered = channels.filter(c => c.name.toLowerCase().includes(searchTerm));
        const container = document.getElementById("channelsList");
        container.innerHTML = filtered.map(ch => `
            <div class="channel-card ${activeId === ch.id ? 'active' : ''}" data-id="${ch.id}">
                <div style="font-size:1.5rem;">${ch.logo || "📡"}</div>
                <div style="flex:1; font-weight:500;">${ch.name}</div>
                <button class="delete-btn" data-id="${ch.id}">🗑️</button>
            </div>
        `).join("");

        // کلیک لە کارت
        document.querySelectorAll(".channel-card").forEach(card => {
            card.addEventListener("click", (e) => {
                if(e.target.classList.contains("delete-btn")) return;
                const id = parseInt(card.dataset.id);
                if(id) setActiveChannel(id);
            });
        });

        // دوگمەی سڕینەوە
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                deleteChannel(id);
            });
        });
    }

    function setActiveChannel(id) {
        const channel = channels.find(ch => ch.id === id);
        if(!channel) return;
        activeId = id;
        const video = document.getElementById("videoPlayer");
        video.src = channel.url;
        video.load();
        video.play().catch(e => console.log("Auto-play prevented"));
        renderChannels();
        // نمایش EPG
        const epgDiv = document.getElementById("epgInfo");
        if(channel.epg && channel.epg.length) {
            epgDiv.innerHTML = channel.epg.map(prog => {
                const [time, title] = prog.split(" - ");
                return `<div class="epg-item"><span style="min-width:70px;">⏰ ${time}</span><span>${title || prog}</span></div>`;
            }).join("");
        } else {
            epgDiv.innerHTML = "<div style='padding:10px;'>هیچ EPG بەردەست نییە</div>";
        }
    }

    function deleteChannel(id) {
        if(channels.length <= 1) {
            alert("ناتوانیت هەموو کەناڵەکان بسڕیتەوە، لانیکەم یەک کەناڵ دەبێت بمێنێت");
            return;
        }
        channels = channels.filter(ch => ch.id !== id);
        if(activeId === id) setActiveChannel(channels[0].id);
        saveToLocal();
        renderChannels();
    }

    function addNewChannel() {
        let name = prompt("ناوی کەناڵ:");
        if(!name) return;
        let url = prompt("URL ی پەخش (m3u8 یان mp4):");
        if(!url) return;
        const newId = Date.now();
        channels.push({
            id: newId,
            name: name,
            logo: "📡",
            url: url,
            epg: ["بەرنامەی نوێ - بێ کات"]
        });
        saveToLocal();
        renderChannels();
        setActiveChannel(newId);
    }

    // بارکردن و ڕێکخستنی سەرەتایی
    loadFromLocal();
    renderChannels();
    setActiveChannel(activeId);

    document.getElementById("addChannelBtn").onclick = addNewChannel;
    document.getElementById("searchInput").addEventListener("input", renderChannels);

    // ڕێگریکردن لە گۆڕینی orientation لە ڕێگەی CSS و metadata
    window.addEventListener("resize", () => {
        // هیچ کارێکی زیادە ناکات، تەنیا دڵنیابێتەوە شتێک نەگۆڕێت
        document.documentElement.style.width = "100%";
        document.body.style.width = "100%";
    });
</script>
</body>
</html>
