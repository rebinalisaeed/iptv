<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPTV - دیزاینی هەمیشە درێژی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0f1c;
            overflow: hidden;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        /* 
          کانتێنەری سەرەکی: بە شێوەی ڕیز (ئاسۆیی) ڕێک دەخرێت 
          و هەمیشە پانتایی و بەرزی تەواوی شاشە دەگرێت
        */
        .iptv-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* لای چەپ - لیستی کەناڵەکان */
        .channels-side {
            width: 35%;
            background: rgba(8, 12, 25, 0.98);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 1rem;
            background: #03060c;
        }

        .header h2 {
            font-size: 1.2rem;
            background: linear-gradient(135deg, #fff, #5db0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-area {
            background: #1e2a3a;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .search-area input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 0.9rem;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #111a2a;
            margin-bottom: 8px;
            padding: 10px 12px;
            border-radius: 1.2rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.1s;
        }

        .channel-item.active {
            background: #1f3a60;
            border-left-color: #3b82f6;
        }

        .delete-channel {
            margin-left: auto;
            background: none;
            border: none;
            color: #ff9f8f;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* لای ڕاست - ڤیدیۆ و EPG */
        .video-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .player-wrapper {
            background: #000;
            flex: 2;
            min-height: 55%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .epg-wrapper {
            background: #0a0e16e6;
            padding: 0.8rem;
            flex: 1;
            overflow-y: auto;
        }

        .epg-card {
            background: #111b26;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 14px;
            display: flex;
            gap: 12px;
        }

        button {
            background: #2d4a7c;
            border: none;
            padding: 8px 0;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* ڕێکخستن بۆ شاشەی بچووک - بەڵام هەر بە شێوەی ڕیز */
        @media (max-width: 700px) {
            .channels-side {
                width: 40%;
            }
            .header h2 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="iptv-container">
    <!-- لای چەپ -->
    <div class="channels-side">
        <div class="header">
            <h2>📡 IPTV پلەیەر</h2>
            <div class="search-area">
                <span>🔍</span>
                <input type="text" id="searchChannel" placeholder="گەڕان بە کەناڵ...">
            </div>
        </div>
        <div class="channels-list" id="channelsList"></div>
        <div style="padding: 10px;">
            <button id="addBtn">+ کەناڵی نوێ</button>
        </div>
    </div>

    <!-- لای ڕاست -->
    <div class="video-side">
        <div class="player-wrapper">
            <video id="mainVideo" controls autoplay playsinline></video>
        </div>
        <div class="epg-wrapper">
            <div id="epgContent">📺 کەناڵێک هەڵبژێرە</div>
        </div>
    </div>
</div>

<script>
    // داتای بنەڕەتی
    let channelsData = [
        { id: 1, name: "AL JAZEERA", logo: "🌍", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", epg: ["06:00 - هەواڵی بەیانی", "12:00 - کۆڕبەندی سیاسی", "18:00 - پەخشی ڕاستەوخۆ"] },
        { id: 2, name: "BBC WORLD", logo: "📺", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8", epg: ["07:00 - Global News", "14:00 - Tech Life", "20:00 - Documentary"] },
        { id: 3, name: "SPORT 24", logo: "⚽", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", epg: ["09:00 - پوختەی یارییەکان", "16:00 - یاری راستەوخۆ", "22:00 - گفتوگۆ"] }
    ];
    let currentActiveId = 1;

    // LocalStorage
    function saveData() {
        localStorage.setItem("iptv_permanent_landscape", JSON.stringify(channelsData));
    }

    function loadData() {
        const stored = localStorage.getItem("iptv_permanent_landscape");
        if(stored) {
            channelsData = JSON.parse(stored);
        }
        if(!channelsData.length) channelsData = [...channelsData];
        currentActiveId = channelsData[0].id;
    }

    function renderList() {
        const searchWord = document.getElementById("searchChannel").value.toLowerCase();
        const filtered = channelsData.filter(c => c.name.toLowerCase().includes(searchWord));
        const container = document.getElementById("channelsList");
        container.innerHTML = filtered.map(ch => `
            <div class="channel-item ${currentActiveId === ch.id ? 'active' : ''}" data-id="${ch.id}">
                <div style="font-size:1.5rem;">${ch.logo || "📡"}</div>
                <div style="flex:1; font-weight:500;">${ch.name}</div>
                <button class="delete-channel" data-id="${ch.id}">🗑️</button>
            </div>
        `).join("");

        document.querySelectorAll(".channel-item").forEach(el => {
            el.addEventListener("click", (e) => {
                if(e.target.classList.contains("delete-channel")) return;
                const id = parseInt(el.dataset.id);
                if(id) setActive(id);
            });
        });

        document.querySelectorAll(".delete-channel").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                deleteById(id);
            });
        });
    }

    function setActive(id) {
        const channel = channelsData.find(c => c.id === id);
        if(!channel) return;
        currentActiveId = id;
        const video = document.getElementById("mainVideo");
        video.src = channel.url;
        video.load();
        video.play().catch(e => console.log("play error"));
        renderList();
        
        const epgDiv = document.getElementById("epgContent");
        if(channel.epg && channel.epg.length) {
            epgDiv.innerHTML = channel.epg.map(prog => {
                const parts = prog.split(" - ");
                return `<div class="epg-card"><span style="min-width:70px;">⏰ ${parts[0]}</span><span>${parts[1] || prog}</span></div>`;
            }).join("");
        } else {
            epgDiv.innerHTML = "<div style='padding:10px;'>EPG بەردەست نییە</div>";
        }
    }

    function deleteById(id) {
        if(channelsData.length <= 1) {
            alert("پێویستە لانیکەم یەک کەناڵ هەبێت");
            return;
        }
        channelsData = channelsData.filter(c => c.id !== id);
        if(currentActiveId === id) setActive(channelsData[0].id);
        saveData();
        renderList();
    }

    function addChannel() {
        let name = prompt("ناوی کەناڵ:");
        if(!name) return;
        let url = prompt("URL ی پەخش (m3u8 یان mp4):");
        if(!url) return;
        const newId = Date.now();
        channelsData.push({
            id: newId,
            name: name,
            logo: "📡",
            url: url,
            epg: ["بەرنامەی نوێ - کات دیار نییە"]
        });
        saveData();
        renderList();
        setActive(newId);
    }

    loadData();
    renderList();
    setActive(currentActiveId);

    document.getElementById("addBtn").onclick = addChannel;
    document.getElementById("searchChannel").addEventListener("input", renderList);
</script>
</body>
</html>
