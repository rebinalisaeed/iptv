<!DOCTYPE html>
<html lang="ckb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXINFLIX - فیلم و زنجیرە و تەلەڤزیۆنی ڕاستەوخۆ</title>
  
  <!-- فۆنتە تایبەتەکانی EXINFLIX -->
  <style>
    @font-face {
      font-family: 'Exinflix Bold';
      src: url('fonts/Exinflix-Bd.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }
    
    @font-face {
      font-family: 'Exinflix Regular';
      src: url('fonts/Exinflix-Reg.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Exinflix Regular', 'Poppins', sans-serif;
      background: #0B0B12;
      min-height: 100vh;
    }
    
    .glass-card {
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
    }
    
    .glass-card:hover {
      border-color: rgba(255, 0, 110, 0.5);
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.2);
      transform: translateY(-5px);
    }
    
    .big-box {
      height: 180px;
      cursor: pointer;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    
    .big-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
      z-index: 1;
    }
    
    .big-box .content {
      position: relative;
      z-index: 2;
    }
    
    /* شێوازی لیست بۆکسی زمان */
    .language-select {
      background: rgba(20, 20, 35, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.75rem;
      padding: 0.5rem 0.75rem;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
      min-width: 210px;
      font-family: 'Exinflix Regular', sans-serif;
    }
    
    .language-select:hover {
      border-color: #FF006E;
      outline: none;
    }
    
    .language-select:focus {
      border-color: #FF006E;
      outline: none;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade {
      animation: fadeIn 0.6s ease forwards;
    }
  </style>
</head>
<body>

  <div class="max-w-6xl mx-auto px-6 py-6 animate-fade">

    <!-- ==================== لۆگۆ + لیستی زمانەکان (لە تەنیشت یەکتر، ناوەڕاست) ==================== -->
    <div class="flex justify-center items-center gap-4 mb-10">
      
      <!-- لۆگۆ - ٤٠٪ بچووکتر -->
      <img src="assets/logo/logo.png" alt="EXINFLIX Logo" class="h-12 w-auto">
      
      <!-- لیستی زمانەکان (select box) -->
      <select id="languageSelect" class="language-select">
        <option value="ckb" selected>🇮🇶 کوردی (سۆرانی) - Sorani</option>
        <option value="ckb-badini">🇮🇶 کوردی (بادینی) - Badini</option>
        <option value="kmr">🇮🇶 کوردی (کورمانجی) - Kurmanji</option>
        <option value="ar">🇸🇦 العربية - Arabic</option>
        <option value="en">🇬🇧 English</option>
        <option value="tr">🇹🇷 Türkçe - Turkish</option>
        <option value="fa">🇮🇷 فارسی - Persian</option>
        <option value="ru">🇷🇺 Русский - Russian</option>
        <option value="fr">🇫🇷 Français - French</option>
        <option value="es">🇪🇸 Español - Spanish</option>
        <option value="pt">🇵🇹 Português - Portuguese</option>
        <option value="de">🇩🇪 Deutsch - German</option>
        <option value="sv">🇸🇪 Svenska - Swedish</option>
        <option value="it">🇮🇹 Italiano - Italian</option>
        <option value="zh">🇨🇳 中文 - Chinese</option>
        <option value="ko">🇰🇷 한국어 - Korean</option>
      </select>
    </div>

    <!-- ==================== دوو بۆکس لە تەنیشت یەکتر (قەبارەیان ٦٠٪ بچووکترە) ==================== -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      
      <!-- بۆکسی لای چەپ: فیلم و زنجیرە -->
      <div class="glass-card big-box overflow-hidden" 
           style="background-image: url('https://placehold.co/800x600/1A1E2F/FF7A00?text=Movies+%26+Series');"
           onclick="window.location.href='movies-series.html'">
        <div class="content flex flex-col justify-center items-center h-full p-4 text-center">
          <i class="fas fa-play-circle text-4xl text-white opacity-90 mb-2"></i>
          <h2 class="text-xl font-black" style="font-family: 'Exinflix Bold', sans-serif;">فیلم و زنجیرە</h2>
        </div>
      </div>

      <!-- بۆکسی لای ڕاست: کەناڵە جیهانییەکان -->
      <div class="glass-card big-box overflow-hidden" 
           style="background-image: url('https://placehold.co/800x600/1A1A2E/FF006E?text=Live+TV+World+Channels');"
           onclick="window.location.href='live-tv.html'">
        <div class="content flex flex-col justify-center items-center h-full p-4 text-center">
          <i class="fas fa-satellite-dish text-4xl text-white opacity-90 mb-2"></i>
          <h2 class="text-xl font-black" style="font-family: 'Exinflix Bold', sans-serif;">کەناڵە جیهانییەکان</h2>
        </div>
      </div>
    </div>

  </div>

  <script>
    const langSelect = document.getElementById('languageSelect');
    langSelect.addEventListener('change', function() {
      localStorage.setItem('exinflix_language', this.value);
      console.log('زمانی هەڵبژێردراو:', this.options[this.selectedIndex].text);
    });
  </script>
</body>
</html>
