<html lang="ckb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EXINFLIX</title>
  
  <style>
    @font-face {
      font-family: 'Exinflix Bold';
      src: url('fonts/Exinflix-Bd.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }
    @font-face {
      font-family: 'Exinflix Regular';
      src: url('fonts/Exinflix-Reg.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Exinflix Regular', sans-serif;
      background-image: url('assets/images/background/9736.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      overflow: hidden;
    }
    .navbar {
      background: rgba(20, 20, 35, 0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.5rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .navbar-logo { height: 32px; width: auto; display: block; }
    .nav-menu {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.5rem;
    }
    .menu-link {
      color: #e5e5e5;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
      cursor: pointer;
    }
    .menu-link:hover { color: #FF006E; }
    .language-icon {
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.2), rgba(255, 122, 0, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      backdrop-filter: blur(4px);
    }
    .language-icon:hover {
      background: linear-gradient(135deg, rgba(255, 0, 110, 0.4), rgba(255, 122, 0, 0.4));
      border-color: #FF006E;
    }
    .language-dropdown {
      position: absolute;
      top: 50px;
      right: 0;
      background: rgba(20, 20, 35, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 0.75rem;
      padding: 0.5rem;
      min-width: 200px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .language-dropdown::-webkit-scrollbar { width: 5px; }
    .language-dropdown::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    .language-dropdown::-webkit-scrollbar-thumb { background: #FF006E; border-radius: 10px; }
    .language-dropdown.show { display: block; }
    .language-option {
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8rem;
      color: #e5e5e5;
    }
    .language-option:hover { background: rgba(255, 0, 110, 0.3); color: white; }
    .navbar-container {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }
    .navbar-right { display: flex; align-items: center; }
    .language-container { position: relative; }
    .boxes-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 60px);
      overflow: hidden;
    }
