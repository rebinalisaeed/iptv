<!DOCTYPE html>
<html lang="ckb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXINFLIX - فیلم و زنجیرە و تەلەڤزیۆنی ڕاستەوخۆ</title>
  
  <!-- فۆنتە تایبەتەکانی EXINFLIX -->
  <style>
    @font-face {
      font-family: 'Exinflix Bold';
      src: url('fonts/Exinflix-Bd.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }
    
    @font-face {
      font-family: 'Exinflix Regular';
      src: url('fonts/Exinflix-Reg.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Exinflix Regular', 'Poppins', sans-serif;
      background: #0B0B12;
      min-height: 100vh;
    }
    
    /* شێوازی بانەڕ - بچووکتر */
    .navbar {
      background: rgba(20, 20, 35, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.5rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    
    /* شێوازی مینوو - بچووکتر */
    .menu-link {
      color: #e5e5e5;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
      padding: 0.3rem 0;
    }
    
    .menu-link:hover {
      color: #FF006E;
    }
    
    /* شێوازی لیست بۆکسی زمان - بچووکتر */
    .language-select {
      background: rgba(20, 20, 35, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.5rem;
      padding: 0.25rem 0.5rem;
      color: white;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'Exinflix Regular', sans-serif;
    }
    
    .language-select:hover {
      border-color: #FF006E;
      outline: none;
    }
    
    .language-select:focus {
      border-color: #FF006E;
      outline: none;
    }
    
    /* شێوازی بۆکسەکان */
    .glass-card {
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.5rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .glass-card:hover {
      border-color: rgba(255, 0, 110, 0.5);
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.2);
      transform: translateY(-5px);
    }
    
    .box {
      height: 280px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }
    
    .box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
      z-index: 1;
    }
    
    .box .content {
      position: relative;
      z-index: 2;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade {
      animation: fadeIn 0.6s ease forwards;
    }
  </style>
</head>
<body>

  <!-- ==================== بانەڕ (Navbar) - بچووکتر ==================== -->
  <div class="navbar">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      
      <!-- لای چەپ: لۆگۆ - زۆر بچووک (h-4) -->
      <img src="assets/logo/logo.png" alt="EXINFLIX Logo" class="h-4 w-auto">
      
      <!-- لای ڕاست: مینوو + لیستی زمانەکان -->
      <div class="flex items-center gap-4">
        <a href="index.html" class="menu-link">ماڵەوە</a>
        <a href="movies-series.html" class="menu-link">فیلم و زنجیرە</a>
        <a href="live-tv.html" class="menu-link">کەناڵەکان</a>
        
        <!-- لیستی زمانەکان -->
        <select id="languageSelect" class="language-select">
          <option value="ckb" selected>🇮🇶 کوردی (سۆرانی)</option>
          <option value="ckb-badini">🇮🇶 کوردی (بادینی)</option>
          <option value="kmr">🇮🇶 کوردی (کورمانجی)</option>
          <option value="ar">🇸🇦 العربية</option>
          <option value="en">🇬🇧 English</option>
          <option value="tr">🇹🇷 Türkçe</option>
          <option value="fa">🇮🇷 فارسی</option>
          <option value="ru">🇷🇺 Русский</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="es">🇪🇸 Español</option>
          <option value="pt">🇵🇹 Português</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="sv">🇸🇪 Svenska</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ko">🇰🇷 한국어</option>
        </select>
      </div>
    </div>
  </div>

  <!-- ==================== ناوەڕۆکی سەرەکی ==================== -->
  <div class="max-w-5xl mx-auto px-6 py-12 animate-fade">

    <!-- دوو بۆکس لە تەنیشت یەکتر -->
    <div class="grid grid-cols-2 gap-8">
      
      <!-- بۆکسی چەپ: کەناڵە جیهانییەکان (TV) -->
      <div class="glass-card box" 
           style="background-image: url('https://placehold.co/800x600/1A1A2E/FF006E?text=Live+TV+World+Channels');"
           onclick="window.location.href='live-tv.html'">
        <div class="content flex flex-col justify-center items-center h-full p-6 text-center">
          <i class="fas fa-tv text-6xl text-white opacity-90 mb-4"></i>
          <h2 class="text-3xl font-black" style="font-family: 'Exinflix Bold', sans-serif;">تەلەڤزیۆن</h2>
          <p class="text-gray-300 text-sm mt-2">زیاتر لە ١٠٠٠ کەناڵ</p>
        </div>
      </div>

      <!-- بۆکسی ڕاست: فیلم و زنجیرە -->
      <div class="glass-card box" 
           style="background-image: url('https://placehold.co/800x600/1A1E2F/FF7A00?text=Movies+%26+Series');"
           onclick="window.location.href='movies-series.html'">
        <div class="content flex flex-col justify-center items-center h-full p-6 text-center">
          <i class="fas fa-play-circle text-6xl text-white opacity-90 mb-4"></i>
          <h2 class="text-3xl font-black" style="font-family: 'Exinflix Bold', sans-serif;">فیلم و زنجیرە</h2>
          <p class="text-gray-300 text-sm mt-2">هەزاران فیلم و زنجیرە</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const langSelect = document.getElementById('languageSelect');
    langSelect.addEventListener('change', function() {
      localStorage.setItem('exinflix_language', this.value);
      console.log('زمانی هەڵبژێردراو:', this.options[this.selectedIndex].text);
    });
  </script>
</body>
</html>
