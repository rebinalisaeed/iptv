<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IPTV - دیزاینی درێژی بۆ مۆبایل</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ڕێگاگرتن لە هەر گۆڕانێکی ئاراستە */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            background: #000;
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* کانتێنەری سەرەکی بە شێوەی درێژی زۆر */
        .iptv-root {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1c;
            display: flex;
            flex-direction: row; /* ئاسۆیی */
            overflow: hidden;
        }

        /* ڕێگای سادە بۆ ناچاری درێژی لەسەر مۆبایل */
        @media (orientation: portrait) {
            .orientation-warning {
                display: flex;
                position: fixed;
                inset: 0;
                background: #000000dd;
                backdrop-filter: blur(12px);
                z-index: 9999;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                color: white;
                text-align: center;
                font-size: 1.4rem;
                font-weight: bold;
            }
            .iptv-root {
                filter: blur(4px);
                pointer-events: none;
            }
        }

        @media (orientation: landscape) {
            .orientation-warning {
                display: none;
            }
            .iptv-root {
                filter: blur(0);
                pointer-events: auto;
            }
        }

        /* لای چەپ - لیستی کەناڵەکان */
        .channels-side {
            width: 32%;
            background: rgba(8, 12, 25, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .side-header {
            padding: 1rem;
            background: #03060c;
        }

        .search-bar {
            background: #1e2a3a;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
        }

        .channels-list {
            flex: 1;
            padding: 0.6rem;
        }

        .channel-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #111a2a;
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 1.2rem;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .channel-card.active {
            background: #1f3a60;
            border-left-color: #3b82f6;
        }

        .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #ff8a7a;
            font-size: 1.2rem;
        }

        /* بەشی ڕاست (ڤیدیۆ + EPG) */
        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #010101;
        }

        .player-box {
            background: black;
            flex: 2;
            min-height: 55%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .epg-box {
            background: #0a0e16e6;
            padding: 0.8rem;
            flex: 1;
            overflow-y: auto;
        }

        .epg-single {
            background: #111b26;
            margin-bottom: 6px;
            padding: 10px;
            border-radius: 14px;
            display: flex;
            gap: 12px;
        }

        button {
            background: #2d4a7c;
            border: none;
            padding: 8px 12px;
            border-radius: 28px;
            color: white;
            font-weight: bold;
        }

        /* ڕێکخستن بۆ مۆبایلە بچووکەکان */
        @media (max-width: 700px) and (orientation: landscape) {
            .channels-side { width: 38%; }
            .channel-card { padding: 8px; }
        }
    </style>
</head>
<body>

<div class="iptv-root">
    <!-- لای چەپ -->
    <div class="channels-side">
        <div class="side-header">
            <h2 style="font-size:1.3rem;">📡 IPTV پلەیەر</h2>
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="searchChannel" placeholder="گەڕان بە کەناڵ...">
            </div>
        </div>
        <div class="channels-list" id="channelsContainer"></div>
        <div style="padding:10px;">
            <button id="addNewBtn" style="width:100%;">+ کەناڵی نوێ</button>
        </div>
    </div>

    <!-- لای ڕاست -->
    <div class="video-area">
        <div class="player-box">
            <video id="mainVideo" controls autoplay playsinline></video>
        </div>
        <div class="epg-box">
            <div id="epgContent">🏷️ کەناڵێک هەڵبژێرە بۆ بینینی بەرنامەکان</div>
        </div>
    </div>
</div>

<div class="orientation-warning" id="warningMsg">
    ⚠️ تکایە مۆبایلەکە بە شێوەی درێژی (لەندسکەیپ) ڕابگرە ⚠️
    <br>
    <span style="font-size:0.9rem;">🔁 مۆبایلەکە بسوڕێنە</span>
</div>

<script>
    // داتای بنەڕەتی
    let channelsList = [
        { id: 1, name: "AL JAZEERA", logo: "🌍", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", epg: ["06:00 - هەواڵ", "12:00 - کۆڕبەندی", "18:00 - پەخشی راستەوخۆ"] },
        { id: 2, name: "BBC WORLD", logo: "📺", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8", epg: ["07:00 - News", "15:00 - Tech", "21:00 - Drama"] },
        { id: 3, name: "SPORT 24", logo: "⚽", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", epg: ["10:00 - پوختە", "16:00 - یاری راستەوخۆ"] }
    ];

    let activeId = 1;

    // هەڵگرتن لە LocalStorage
    function saveChannels() {
        localStorage.setItem("mobiptv_channels", JSON.stringify(channelsList));
    }

    function loadChannels() {
        const stored = localStorage.getItem("mobiptv_channels");
        if(stored) channelsList = JSON.parse(stored);
        if(!channelsList.length) channelsList = [...channelsList];
        activeId = channelsList[0].id;
    }

    function renderChannels() {
        const term = document.getElementById("searchChannel").value.toLowerCase();
        const filtered = channelsList.filter(c => c.name.toLowerCase().includes(term));
        const container = document.getElementById("channelsContainer");
        container.innerHTML = filtered.map(ch => `
            <div class="channel-card ${activeId === ch.id ? 'active' : ''}" data-id="${ch.id}">
                <div style="font-size:1.6rem;">${ch.logo || "📡"}</div>
                <div style="flex:1; font-weight:500;">${ch.name}</div>
                <button class="delete-btn" data-id="${ch.id}" style="background:transparent;">🗑️</button>
            </div>
        `).join("");

        document.querySelectorAll(".channel-card").forEach(card => {
            card.addEventListener("click", (e) => {
                if(e.target.classList.contains("delete-btn")) return;
                const id = parseInt(card.dataset.id);
                if(id) setActiveChannel(id);
            });
        });

        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                deleteChannelById(id);
            });
        });
    }

    function setActiveChannel(id) {
        const channel = channelsList.find(c => c.id === id);
        if(!channel) return;
        activeId = id;
        const video = document.getElementById("mainVideo");
        video.src = channel.url;
        video.load();
        video.play().catch(e=>console.log);
        renderChannels();
        if(channel.epg && channel.epg.length) {
            document.getElementById("epgContent").innerHTML = channel.epg.map(p => `<div class="epg-single"><span style="min-width:70px;">⏰ ${p.split(' - ')[0]}</span><span>${p.split(' - ')[1] || p}</span></div>`).join("");
        } else {
            document.getElementById("epgContent").innerHTML = "هیچ EPG بەردەست نییە";
        }
    }

    function deleteChannelById(id) {
        if(channelsList.length === 1) { alert("ناتوانی هەموو کەناڵەکان بسڕیتەوە"); return; }
        channelsList = channelsList.filter(ch => ch.id !== id);
        if(activeId === id) setActiveChannel(channelsList[0].id);
        saveChannels();
        renderChannels();
    }

    function addChannel() {
        let name = prompt("ناوی کەناڵ:");
        if(!name) return;
        let url = prompt("URL ی پەخش (m3u8 یان mp4):");
        if(!url) return;
        const newId = Date.now();
        channelsList.push({ id: newId, name: name, logo: "📺", url: url, epg: ["بەرنامەی نوێ - کاتێک دیار نییە"] });
        saveChannels();
        renderChannels();
        setActiveChannel(newId);
    }

    document.getElementById("addNewBtn").onclick = addChannel;
    document.getElementById("searchChannel").addEventListener("input", renderChannels);
    loadChannels();
    renderChannels();
    setActiveChannel(activeId);

    // ئەگەر شاشەکە بە ستوونی بوو، پیام پیشان بدە
    function checkOrientation() {
        if(window.matchMedia("(orientation: portrait)").matches) {
            document.getElementById("warningMsg").style.display = "flex";
        } else {
            document.getElementById("warningMsg").style.display = "none";
        }
    }
    window.addEventListener("resize", checkOrientation);
    window.addEventListener("load", checkOrientation);
    checkOrientation();
</script>
</body>
</html>
