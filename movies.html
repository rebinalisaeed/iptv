<html lang="ckb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXINFLIX - فیلمەکان</title>
  
  <style>
    @font-face {
      font-family: 'Exinflix Bold';
      src: url('fonts/Exinflix-Bd.ttf') format('truetype');
      font-weight: bold;
      font-display: swap;
    }
    @font-face {
      font-family: 'Exinflix Regular';
      src: url('fonts/Exinflix-Reg.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Exinflix Regular', 'Poppins', sans-serif;
      background-image: url('assets/images/background/9736.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }
    
    body.rtl { direction: rtl; text-align: right; }
    body.ltr { direction: ltr; text-align: left; }
    
    .navbar {
      background: rgba(20, 20, 35, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.75rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    
    .navbar-container {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .navbar-logo { height: 32px; width: auto; }
    
    .back-link {
      color: #FF006E;
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      font-family: 'Exinflix Regular', sans-serif;
    }
    
    .back-link:hover { opacity: 0.8; transform: translateX(-4px); }
    body.rtl .back-link:hover { transform: translateX(4px); }
    
    .slider-container {
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      position: relative;
    }
    
    .slider-title {
      font-size: 1.5rem;
      font-family: 'Exinflix Bold', sans-serif;
      color: white;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .slider-title i { color: #FF006E; font-size: 1.3rem; }
    
    .slider-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 1rem;
    }
    
    .slider {
      display: flex;
      transition: transform 0.5s ease;
    }
    
    .slide {
      min-width: 100%;
      position: relative;
      border-radius: 1rem;
      overflow: hidden;
      height: 400px;
    }
    
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .slide-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
      padding: 3rem 2rem 2rem;
      color: white;
    }
    
    .slide-content h2 {
      font-size: 2rem;
      font-family: 'Exinflix Bold', sans-serif;
      margin-bottom: 0.5rem;
    }
    
    .slide-content p {
      font-size: 0.9rem;
      opacity: 0.8;
      max-width: 60%;
    }
    
    .slide-btn {
      background: linear-gradient(135deg, #FF006E, #FF7A00);
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      color: white;
      font-family: 'Exinflix Bold', sans-serif;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s;
    }
    
    .slide-btn:hover { transform: scale(1.05); opacity: 0.9; }
    
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s;
      font-size: 1.2rem;
    }
    
    .slider-btn:hover { background: #FF006E; }
    
    .slider-prev { left: 10px; }
    .slider-next { right: 10px; }
    body.rtl .slider-prev { left: auto; right: 10px; }
    body.rtl .slider-next { right: auto; left: 10px; }
    
    .movies-section {
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    
    .section-title {
      font-size: 1.5rem;
      font-family: 'Exinflix Bold', sans-serif;
      color: white;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border-right: 4px solid #FF006E;
      padding-right: 15px;
    }
    body.rtl .section-title { border-right: none; border-left: 4px solid #FF006E; padding-right: 0; padding-left: 15px; }
    
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
    }
    
    .movie-card {
      background: rgba(20, 20, 35, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .movie-card:hover {
      transform: translateY(-8px);
      border-color: #FF006E;
      box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
    }
    
    .movie-card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }
    
    .movie-info {
      padding: 1rem;
    }
    
    .movie-title {
      font-family: 'Exinflix Bold', sans-serif;
      color: white;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    
    .movie-year {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.75rem;
    }
    
    .movie-rating {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 0.5rem;
      color: #FFD700;
      font-size: 0.8rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      background: rgba(20, 20, 35, 0.5);
      border-radius: 1rem;
      color: rgba(255,255,255,0.6);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade { animation: fadeIn 0.5s ease forwards; }
  </style>
</head>

    const rtlLanguages = ['ar', 'ckb', 'ckb-badini', 'fa'];

    function getCurrentLanguage() {
      let savedLang = localStorage.getItem('exinflix_language');
      if (savedLang && translations[savedLang]) return savedLang;
      if (navigator.language === 'zh-CN') return 'zh-CN';
      if (navigator.language === 'zh-TW' || navigator.language === 'zh-HK') return 'zh-TW';
      let browserLang = navigator.language.split('-')[0];
      if (browserLang === 'hi') return 'hi';
      if (browserLang === 'ja') return 'ja';
      if (browserLang === 'pl') return 'pl';
      return 'ckb';
    }

    let currentLang = getCurrentLanguage();
    const t = translations[currentLang];

    if (rtlLanguages.includes(currentLang)) {
      document.body.classList.add('rtl');
      document.body.classList.remove('ltr');
    } else {
      document.body.classList.add('ltr');
      document.body.classList.remove('rtl');
    }

    document.getElementById('backText').innerText = t.back;
    document.getElementById('sliderTitle').innerHTML = `<i class="fas fa-fire"></i> ${t.sliderTitle}`;
    document.getElementById('moviesTitle').innerHTML = `<i class="fas fa-film"></i> ${t.moviesTitle}`;
    document.getElementById('slide1Title').innerText = t.slide1Title;
    document.getElementById('slide1Desc').innerText = t.slide1Desc;
    document.getElementById('slide2Title').innerText = t.slide2Title;
    document.getElementById('slide2Desc').innerText = t.slide2Desc;
    document.getElementById('slide3Title').innerText = t.slide3Title;
    document.getElementById('slide3Desc').innerText = t.slide3Desc;
    
    document.querySelectorAll('.slide-btn').forEach(btn => btn.innerText = t.watchBtn);

    const moviesGrid = document.getElementById('moviesGrid');
    moviesGrid.innerHTML = '';
    if (t.movies && t.movies.length) {
      t.movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.onclick = () => alert(`فیلمی ${movie.title} - لە داهاتوودا زیاد دەکرێت`);
        card.innerHTML = `
          <img src="https://placehold.co/300x450/1A1E2F/FF006E?text=${encodeURIComponent(movie.title)}">
          <div class="movie-info">
            <div class="movie-title">${movie.title}</div>
            <div class="movie-year">${movie.year} • ${movie.genre}</div>
            <div class="movie-rating"><i class="fas fa-star"></i> ${movie.rating}</div>
          </div>
        `;
        moviesGrid.appendChild(card);
      });
    } else {
      moviesGrid.innerHTML = '<div class="empty-state">هیچ فیلمێک نەدۆزرایەوە</div>';
    }

    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const totalSlides = slides.length;
    const slider = document.getElementById('slider');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function updateSlider() {
      slider.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    prevBtn.addEventListener('click', () => {
      currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
      updateSlider();
    });

    nextBtn.addEventListener('click', () => {
      currentSlide = (currentSlide + 1) % totalSlides;
      updateSlider();
    });
  </script>
