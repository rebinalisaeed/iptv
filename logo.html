<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inflix Logo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        width:100%;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#050505;
        font-family:'Poppins',sans-serif;
        overflow:hidden;
    }

    .logo-wrapper{
        text-align:center;
    }

    .brand{
        display:flex;
        align-items:center;
        gap:18px;
    }

    /* ICON */
    .icon{
        position:relative;
        width:140px;
        height:140px;
    }

    /* e shape */
    .e-shape{
        position:absolute;
        width:110px;
        height:110px;
        border-radius:50%;
        border:18px solid transparent;
        background:
            linear-gradient(#050505,#050505) padding-box,
            linear-gradient(135deg,#ff8a00,#ff007a,#7a00ff) border-box;
        transform:rotate(0deg);
        left:0;
        top:15px;
    }

    .e-cut{
        position:absolute;
        width:65px;
        height:20px;
        background:#050505;
        top:58px;
        left:50px;
        border-radius:20px;
    }

    /* play button */
    .play{
        position:absolute;
        width:0;
        height:0;
        border-top:22px solid transparent;
        border-bottom:22px solid transparent;
        border-left:38px solid #ff4f8b;
        top:47px;
        left:42px;
        filter:drop-shadow(0 0 10px #ff007a);
    }

    /* X shape */
    .x-shape{
        position:absolute;
        right:-10px;
        top:18px;
        width:70px;
        height:100px;
    }

    .x1,
    .x2{
        position:absolute;
        width:18px;
        height:100px;
        border-radius:20px;
        background:linear-gradient(180deg,#ff9d00,#ff007a,#7a00ff);
        box-shadow:0 0 15px rgba(255,0,122,.5);
    }

    .x1{
        transform:rotate(45deg);
        left:25px;
    }

    .x2{
        transform:rotate(-45deg);
        left:25px;
    }

    /* TEXT */
    .text{
        font-size:78px;
        font-weight:700;
        letter-spacing:2px;
    }

    .in{
        color:#e8e8e8;
    }

    .flix{
        background:linear-gradient(90deg,#ff00a8,#ff7b00);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    .tagline{
        margin-top:12px;
        letter-spacing:10px;
        font-size:14px;
        color:#999;
    }

    .tagline span{
        background:linear-gradient(90deg,#ff00a8,#ff7b00);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    /* glow */
    .glow{
        position:absolute;
        width:500px;
        height:500px;
        background:radial-gradient(circle,#ff007a33 0%,transparent 70%);
        z-index:-1;
        filter:blur(40px);
    }
</style>
</head>

<body>

<div class="glow"></div>

<div class="logo-wrapper">

    <div class="brand">

        <!-- ICON -->
        <div class="icon">

            <div class="e-shape"></div>
            <div class="e-cut"></div>
            <div class="play"></div>

            <div class="x-shape">
                <div class="x1"></div>
                <div class="x2"></div>
            </div>

        </div>

        <!-- TEXT -->
        <div class="text">
            <span class="in">in</span><span class="flix">flix</span>
        </div>

    </div>

    <div class="tagline">
        EXPERIENCE <span>IN FLIX</span>
    </div>

</div>

</body>
</html>
