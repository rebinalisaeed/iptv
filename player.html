<!DOCTYPE html>
<html lang="ckb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXINFLIX - پلێیەر</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Poppins', sans-serif; }
    body { background: #000; }
    .video-container { background: #000; height: 70vh; display: flex; align-items: center; justify-content: center; position: relative; }
    .controls-bar { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
  </style>
</head>
<body>
  <div class="video-container">
    <div class="text-center text-gray-500"><i class="fas fa-play-circle text-7xl text-pink-500"></i><p class="mt-2">شوێنی ڤیدیۆی فیلم / زنجیرە</p></div>
  </div>
  <div class="controls-bar fixed bottom-0 w-full p-4 text-white flex justify-between items-center">
    <div><i class="fas fa-play mx-2"></i><i class="fas fa-volume-up mx-2"></i><i class="fas fa-expand mx-2"></i></div>
    <div>١:٢٣ / ٢:١٥</div>
    <div><i class="fas fa-download"></i> دابەزاندن</div>
  </div>
  <div class="p-4 text-white bg-black"><h2 class="font-bold">زنجیرەی تاوان - ئەڵقەی ٤</h2><div class="flex gap-4 mt-2 text-pink-400"><span>دواتر</span><span>پێشنیار</span></div></div>
</body>
</html>
